<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú de Snacks</title>
<style>
:root{
  --bg:#f4f5f7;
  --card:#ffffff;
  --brand:#ff7e5f;
  --brand-dark:#d35400;
  --text:#1f2937;
  --space-inline:clamp(14px,4vw,30px);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.poster{
  width:100%;
  min-height:100vh;
  background:var(--card);
}
.header{
  background:linear-gradient(135deg,#ff7e5f,#ff9f7f);
  color:#fff;
  text-align:center;
  padding:clamp(24px,5vw,44px) clamp(14px,4vw,30px);
}
.header h1{margin:0;font-size:clamp(2rem,6vw,3.3rem)}
.header p{margin:10px 0 0;font-size:clamp(1rem,2.8vw,1.4rem);opacity:.95}
.content{padding:clamp(16px,4vw,32px) var(--space-inline)}
.category{margin-bottom:clamp(18px,3vw,30px)}
.category-title{
  margin:0 0 14px;
  padding-bottom:8px;
  border-bottom:3px dashed #ffb199;
  font-size:clamp(1.25rem,3.3vw,2rem);
  color:var(--brand-dark);
}
.item{
  display:grid;
  grid-template-columns:minmax(84px,12vw) 1fr auto auto;
  align-items:center;
  gap:clamp(10px,2.5vw,18px);
  padding:clamp(10px,2.2vw,18px);
  border-radius:14px;
}
.item:nth-child(even){background:#fafafa}
.item a{display:inline-flex}
.item img{
  width:min(100%,120px);
  aspect-ratio:1/1;
  object-fit:contain;
  border-radius:10px;
  background:#fff;
}
.item-name{font-size:clamp(1.02rem,2.4vw,1.55rem);line-height:1.35}
.item-price{
  font-weight:700;
  font-size:clamp(1rem,2.2vw,1.4rem);
  color:#b42318;
  background:#fff1f1;
  padding:8px 14px;
  border-radius:999px;
  white-space:nowrap;
}

.item.is-unorderable img{
  filter:none;
  opacity:1;
}

.item.is-unorderable{
  background:inherit;
}

.item.is-unorderable .item-name,
.item.is-unorderable .item-price,
.item.is-unorderable .item-badge{
  opacity:1;
}

/* promotion 只禁止下单，不做灰化处理 */
.item.is-unorderable.is-promo-display{
  background:#fff7ed !important;
  border:1px dashed #f2c094;
}

.item.is-unorderable.is-promo-display img{
  filter:none;
  opacity:1;
}

.item.is-unorderable.is-promo-display .item-name,
.item.is-unorderable.is-promo-display .item-price,
.item.is-unorderable.is-promo-display .item-badge{
  opacity:1;
}
.item-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-left:10px;
  font-size:clamp(.78rem,1.8vw,1rem);
  font-weight:700;
  border-radius:999px;
  padding:5px 10px;
  vertical-align:middle;
}
.item-badge-best{
  color:#8a4b00;
  background:#fff1bf;
}
.item-badge-oos{
  color:#fff;
  background:linear-gradient(135deg,#b91c1c,#dc2626);
  box-shadow:0 8px 16px rgba(185,28,28,.35);
  border:1px solid #991b1b;
  font-weight:900;
  letter-spacing:.25px;
  text-transform:uppercase;
}
.item-badge-soon{
  color:#fff;
  background:linear-gradient(135deg,#b45309,#f59e0b);
  box-shadow:0 8px 16px rgba(180,83,9,.30);
  border:1px solid #92400e;
  font-weight:900;
  letter-spacing:.25px;
  text-transform:uppercase;
}
.item-badge-icon{
  font-size:1.15em;
  line-height:1;
}
.footer{
  text-align:center;
  color:#6b7280;
  padding:18px;
  font-size:clamp(.92rem,2vw,1.15rem);
}
.menu-error{
  margin:12px 0;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid #fecaca;
  background:#fff1f2;
  color:#9f1239;
  font-weight:800;
  line-height:1.45;
}
.image-preview{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.65);padding:16px;z-index:10}
.image-preview.is-open{display:flex}
.image-preview-content{position:relative;background:#fff;padding:12px;border-radius:14px;max-width:96vw;max-height:92vh}
.image-preview-img{max-width:92vw;max-height:84vh;object-fit:contain;border-radius:10px}
.image-preview-close{position:absolute;top:-12px;right:-12px;width:36px;height:36px;border:none;border-radius:50%;background:#ff7e5f;color:#fff;font-size:24px;cursor:pointer}
body.preview-open{overflow:hidden}
@media (max-width:640px) and (hover:none), (max-width:640px) and (pointer:coarse){
  .item{grid-template-columns:72px 1fr auto;gap:10px;padding:10px}
  .item img{width:64px}
}
/* ===== Add (+) button on each item ===== */
.item{
  position: relative; /* 为右侧按钮定位 */
  padding-right: 64px; /* 给右侧➕留空间 */
}

/* ===== Inline Quantity Stepper ===== */



.qty-control{
  display:flex;
  align-items:center;
  gap:6px;
}

.qty-unavailable{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:108px;
  padding:8px 10px;
  border-radius:10px;
  font-size:11px;
  font-weight:900;
  letter-spacing:.35px;
  text-transform:uppercase;
  color:#fff;
  background:linear-gradient(135deg,#6b7280,#374151);
  border:1px solid #1f2937;
  box-shadow:0 6px 12px rgba(31,41,55,.3);
  cursor:not-allowed;
  user-select:none;
}

.qty-unavailable-oos{
  background:linear-gradient(135deg,#b91c1c,#dc2626);
  border-color:#991b1b;
}

.qty-unavailable-soon{
  background:linear-gradient(135deg,#b45309,#f59e0b);
  border-color:#92400e;
}

.qty-unavailable-promo{
  background:linear-gradient(135deg,#c2410c,#fb923c);
  border-color:#9a3412;
}

.qty-btn{
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 900;
  font-size: 18px;
  color: #fff;
  background: linear-gradient(135deg, var(--brand), #ff9f7f);
  box-shadow: 0 8px 18px rgba(255,126,95,.25);
}

.qty-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  box-shadow:none;
}

.qty-btn.minus{
  background: #374151;
}

.qty-number{
  min-width: 24px;
  text-align: center;
  font-weight: 900;
  font-size: 15px;
}

/* ===== Bottom sell bar ===== */
:root{ --sellBarH: 92px; }

.content{
  padding-bottom: calc(clamp(16px,4vw,32px) + var(--sellBarH));
}

.sell-bar{
  position: sticky;
  bottom: 0;
  z-index: 9;
  width: 100%;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(10px);
  border-top: 1px solid #eee;
}

.sell-bar-inner{
  max-width: 1100px;
  margin: 0 auto;
  padding: 12px var(--space-inline);
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  gap: 12px;
  align-items: center;
}

.sell-summary-title{
  font-weight: 900;
  letter-spacing: .2px;
}

.sell-summary-sub{
  font-size: 13px;
  color: #6b7280;
  margin-top: 2px;
}

.sell-submit{
  justify-self: center;
  min-width: 140px;
  padding: 12px 22px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  color: #fff;
  font-weight: 900;
  letter-spacing: .2px;
  background: linear-gradient(135deg, var(--brand), #ff9f7f);
  box-shadow: 0 14px 30px rgba(255,126,95,.30);
}

.sell-submit:disabled{
  opacity: .55;
  cursor: not-allowed;
  box-shadow: none;
}

.sell-promo{
  border: 1px solid #f2c094;
  background: #fff7ed;
  color: #9a3412;
  padding: 12px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 900;
}

.sell-promo:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.sell-clear{
  border: 1px solid #e5e7eb;
  background: #fff;
  color: #374151;
  padding: 12px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 800;
}

.sell-clear:disabled{
  opacity: .55;
  cursor: not-allowed;
}

@media (max-width:1024px) and (hover:none), (max-width:1024px) and (pointer:coarse){
  :root{ --sellBarH: 146px; }

  .sell-bar-inner{
    grid-template-columns: 1fr 1fr;
    grid-template-areas:
      "summary summary"
      "submit promo"
      "savings savings"
      "clear clear";
  }

  .sell-summary{ grid-area:summary; }
  .sell-submit{ grid-area:submit; }
  .sell-promo{ grid-area:promo; }
  .savings-launch{ grid-area:savings; }
  .sell-clear{ grid-area:clear; }

  .sell-submit,
  .sell-promo,
  .savings-launch,
  .sell-clear{
    width:100%;
    justify-self:stretch;
  }
}

/* 小屏适配 */
@media (max-width:640px) and (hover:none), (max-width:640px) and (pointer:coarse){
  :root{ --sellBarH: 182px; }
  .sell-bar{ padding-bottom:max(8px, env(safe-area-inset-bottom)); }
  .sell-bar-inner{
    gap:10px;
    grid-template-columns:1fr;
    grid-template-areas:
      "summary"
      "submit"
      "promo"
      "savings"
      "clear";
  }
  .sell-submit,
  .sell-promo,
  .savings-launch,
  .sell-clear{
    min-height:46px;
  }
  .header h1{ letter-spacing:.2px; font-size:clamp(1.8rem,8vw,2.3rem); }
  .header p{ font-size:1.05rem; }
  .item{ padding-right: 58px; }
  .add-btn{ width: 40px; height: 40px; right: 10px; }
  .qty-unavailable{
    min-width: 94px;
    font-size:10px;
    padding:7px 8px;
  }
  .item{
    grid-template-columns:64px 1fr;
    grid-template-areas:
      "thumb name"
      "thumb price"
      "thumb actions";
    align-items:start;
    row-gap:8px;
  }
  .item a{ grid-area:thumb; }
  .item-name{ grid-area:name; font-size:1.02rem; line-height:1.4; }
  .item-price{ grid-area:price; justify-self:start; font-size:1rem; padding:7px 12px; }
  .qty-control,
  .qty-unavailable{ grid-area:actions; }
  .sell-summary-title{ font-size:1.35rem; }
  .sell-summary-sub{ font-size:1rem; line-height:1.35; }
  .promo-form{
    grid-template-columns:1fr;
  }
  .menu-error{ font-size:1rem; }
}

@media (min-width:641px) and (max-width:900px) and (hover:none), (min-width:641px) and (max-width:900px) and (pointer:coarse){
  .item{
    grid-template-columns:72px 1fr auto;
    grid-template-areas:
      "thumb name actions"
      "thumb price actions";
    align-items:center;
  }
  .item a{ grid-area:thumb; }
  .item-name{ grid-area:name; }
  .item-price{ grid-area:price; justify-self:start; }
  .qty-control,
  .qty-unavailable{ grid-area:actions; justify-self:end; }
}

@media (min-width:641px) and (max-width:900px) and (hover:none), (min-width:641px) and (max-width:900px) and (pointer:coarse){
  .item{
    grid-template-columns:72px 1fr auto;
    grid-template-areas:
      "thumb name actions"
      "thumb price actions";
    align-items:center;
  }
  .item a{ grid-area:thumb; }
  .item-name{ grid-area:name; }
  .item-price{ grid-area:price; justify-self:start; }
  .qty-control,
  .qty-unavailable{ grid-area:actions; justify-self:end; }
}
.cart-drawer{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.3);
  z-index:30;
  opacity: 0;
  transition: opacity .18s ease;
}

.cart-drawer.open{
  display:block;
  opacity: 1;
}
.cart-panel{
  position:absolute;
  right:0;
  top:0;
  height:100%;
  width: min(360px, 92vw);
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(10px);
  box-shadow:-10px 0 30px rgba(0,0,0,.2);
  padding:16px;
  display:flex;
  flex-direction:column;

  transform: translateX(102%);
  transition: transform .22s cubic-bezier(.2,.9,.2,1);
}

.cart-drawer.open .cart-panel{
  transform: translateX(0);
}
/* 可选：关闭按钮更好点 */
#cartClose{
  border:none;
  background:#fff;
  width:36px;
  height:36px;
  border-radius:999px;
  cursor:pointer;
  font-size:22px;
  line-height:1;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  margin-bottom:10px;
}

.cart-items{
  flex:1;
  overflow:auto;
  font-size:14px;
}

.cart-footer{
  font-weight:900;
  margin-top:10px;
}
.cart-item-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1px solid #f1f1f1;
}

.cart-item-main{
  min-width:0;
  flex:1;
}

.cart-item-name{
  font-size:14px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.cart-item-meta{
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:8px;
}

.cart-item-price{
  font-size:13px;
  color:#6b7280;
}

.cart-item-img{
  width:60px;
  height:60px;
  object-fit:contain;
  border-radius:8px;
  background:#fff;
}

.cart-item-qty{
  font-weight:900;
  font-size:12px;
  color:#374151;
  background:#f3f4f6;
  border-radius:999px;
  padding:3px 8px;
}

.cart-item-stepper{
  display:flex;
  align-items:center;
  gap:6px;
}

.cart-step-btn{
  width:30px;
  height:30px;
  border:none;
  border-radius:8px;
  color:#fff;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,var(--brand),#ff9f7f);
}

.cart-step-btn.minus{
  background:#374151;
}

.cart-step-number{
  min-width:20px;
  text-align:center;
  font-size:14px;
  font-weight:900;
}
#cartTotalPrice{
  margin-top:6px;
  font-weight: 900;
  font-size: 18px;
  color: #111827;
}
#cartDiscountPrice{
  margin-top:4px;
  font-weight:800;
  font-size:14px;
  color:#9a3412;
}
.cart-actions{
  margin-top: 12px;
  display:flex;
  gap:10px;
}

.cart-gift{
  flex: 1;
  padding: 12px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,126,95,.35);
  background: rgba(255,126,95,.10);
  color: #b45309;
  font-weight: 900;
  cursor: pointer;
}
.cart-gift:disabled{
  opacity: .55;
  cursor: not-allowed;
}

.promo-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(17,24,39,.45);
  z-index:40;
  padding:16px;
}

.promo-modal.open{
  display:flex;
}

.promo-panel{
  width:min(460px,96vw);
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 20px 45px rgba(0,0,0,.22);
}

.promo-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}

.promo-title{
  font-weight:900;
  color:#9a3412;
}

#promotionClose{
  border:none;
  background:#fff;
  width:32px;
  height:32px;
  border-radius:999px;
  cursor:pointer;
  font-size:22px;
  line-height:1;
}
#payLaterClose{
  border:none;
  background:#fff;
  width:32px;
  height:32px;
  border-radius:999px;
  cursor:pointer;
  font-size:22px;
  line-height:1;
}
#savingsClose{
  border:none;
  background:#fff;
  width:32px;
  height:32px;
  border-radius:999px;
  cursor:pointer;
  font-size:22px;
  line-height:1;
}

.pay-later-summary{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:8px 0 2px;
  color:#374151;
  font-weight:800;
}

.pay-later-payoff{
  border:1px solid #e5e7eb;
  background:#fff;
  color:#374151;
  border-radius:999px;
  padding:6px 10px;
  cursor:pointer;
  font-weight:800;
}

.pay-later-payoff:disabled{
  opacity:.55;
  cursor:not-allowed;
}


.pay-later-actions{
  display:flex;
  gap:8px;
  align-items:center;
}

.pay-later-amount-input{
  width:98px;
  border:1px solid #e5e7eb;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
}

.promo-form{
  display:grid;
  grid-template-columns: 1fr 130px auto;
  gap:10px;
  align-items:end;
}

.savings-form{
  grid-template-columns:repeat(3,minmax(0,1fr));
}

.savings-form .promo-field{
  min-width:0;
}

.savings-form .promo-input{
  width:100%;
}

.savings-form .promo-apply{
  min-width:0;
}

@media (max-width:640px){
  .savings-form{
    grid-template-columns:1fr;
  }
}

.promo-field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.promo-label{
  font-size:12px;
  color:#6b7280;
  font-weight:700;
}

.promo-input{
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
}

.promo-apply{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-weight:900;
  background:linear-gradient(135deg,#fb923c,#f97316);
  color:#fff;
  cursor:pointer;
}

.promo-list{
  margin-top:12px;
  border-top:1px solid #f3f4f6;
  padding-top:10px;
  max-height:220px;
  overflow:auto;
}

.promo-empty{
  font-size:13px;
  color:#6b7280;
}

.promo-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:8px 0;
  border-bottom:1px dashed #f1f1f1;
}

.promo-item-main{
  min-width:0;
}

.promo-item-name{
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.promo-item-meta{
  font-size:12px;
  color:#6b7280;
}

.promo-item-remove{
  border:1px solid #e5e7eb;
  background:#fff;
  color:#374151;
  border-radius:999px;
  padding:6px 10px;
  cursor:pointer;
  font-weight:800;
}

.action-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(17,24,39,.5);
  z-index:50;
  padding:16px;
}

.action-modal.open{
  display:flex;
}

.action-panel{
  width:min(420px,96vw);
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 20px 45px rgba(0,0,0,.25);
}

.action-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.action-title{
  font-weight:900;
  color:#9a3412;
}

.action-close{
  border:none;
  background:#fff;
  width:32px;
  height:32px;
  border-radius:999px;
  cursor:pointer;
  font-size:22px;
  line-height:1;
}

.action-hint{
  margin:0 0 12px;
  font-size:13px;
  color:#6b7280;
}

.action-form{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.action-textarea,
.action-pin{
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  font-family:inherit;
}

.action-textarea{
  min-height:88px;
  resize:vertical;
}

.action-error{
  min-height:18px;
  margin:0;
  font-size:12px;
  color:#b91c1c;
  font-weight:700;
}

.action-actions{
  margin-top:4px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.action-cancel,
.action-confirm{
  border:none;
  border-radius:999px;

const ALLOWED_PAYMENT_TYPES = ["Cash", "Apple Cash", "Zelle", "Pay Later"];
const checkoutState = {
  paymentType: "Cash",
  useSavings: false,
  savingsAccounts: [],

function getEventTargetElement(target){
  if (target instanceof Element) return target;
  if (target && target.nodeType === Node.TEXT_NODE) return target.parentElement;
  return null;
}

function normalizePaymentType(v){
  const raw = String(v || "").trim().toLowerCase();
  const matched = ALLOWED_PAYMENT_TYPES.find((item)=> item.toLowerCase() == raw);
  return matched || "";
}

// Excel 使用英文分类
const CATEGORY_ORDER = [
  "promotion",
  "cookies",
  "chips",
  "candy",
  "protein",
  "drinks",
  "gum",
];

// 分类显示配置：先按标准分类映射；未知分类走备用图标池
const SHOW_CATEGORY_ICON = true;
const CATEGORY_META = {
  cookies: { icon: "🍪", label: "Galletas y dulces horneados" },
  chips: { icon: "🥔", label: "Papas y botanas crujientes" },
  candy: { icon: "🍬", label: "Dulces y chocolates" },
  protein: { icon: "💪", label: "Barras de proteína" },
  drinks: { icon: "🥤", label: "Bebidas" },
  gum: { icon: "🍃", label: "Chicles" },
  promotion: { icon: "🏷️", label: "Promociones" },
};
const PROMOTION_CATEGORY_KEYS = new Set(["promotion"]);
const FALLBACK_CATEGORY_ICONS = ["🧺", "🍱", "🍿", "🍩", "🥨", "🧃", "🍓", "🥜", "🍫", "🧁"];
const FALLBACK_CATEGORY_ICON_OVERRIDES = {
  // 示例："limited special": "🌟",
};
const fallbackCategoryIconCache = new Map();
const fallbackCategoryIconUsage = new Map(FALLBACK_CATEGORY_ICONS.map(icon => [icon, 0]));

function normalizeCategoryKey(v){
  return String(v || "").trim().toLowerCase();
}

function isPromotionCategory(category){
  return PROMOTION_CATEGORY_KEYS.has(normalizeCategoryKey(category));
}

function pickFallbackCategoryIcon(category){
  const key = normalizeCategoryKey(category);

  if (FALLBACK_CATEGORY_ICON_OVERRIDES[key]){
    return FALLBACK_CATEGORY_ICON_OVERRIDES[key];
  }

  if (fallbackCategoryIconCache.has(key)){
    return fallbackCategoryIconCache.get(key);
  }

  if (!FALLBACK_CATEGORY_ICONS.length) return "🧺";

  let hash = 0;
  const s = String(key || "");
  for (let i = 0; i < s.length; i++) hash = ((hash << 5) - hash) + s.charCodeAt(i);

  const start = Math.abs(hash) % FALLBACK_CATEGORY_ICONS.length;
  let bestIcon = FALLBACK_CATEGORY_ICONS[start];
  let bestUsage = Number.POSITIVE_INFINITY;

  for (let i = 0; i < FALLBACK_CATEGORY_ICONS.length; i++){
    const idx = (start + i) % FALLBACK_CATEGORY_ICONS.length;
    const icon = FALLBACK_CATEGORY_ICONS[idx];
    const usage = fallbackCategoryIconUsage.get(icon) || 0;

    if (usage < bestUsage){
      bestUsage = usage;
      bestIcon = icon;
      if (usage === 0) break;
    }
  }

  fallbackCategoryIconCache.set(key, bestIcon);
  fallbackCategoryIconUsage.set(bestIcon, (fallbackCategoryIconUsage.get(bestIcon) || 0) + 1);
  return bestIcon;
}

function getCategoryLabelHtml(category){
  const raw = String(category || "Other").trim() || "Other";
  const key = normalizeCategoryKey(raw);
  const meta = CATEGORY_META[key];
  const text = meta ? meta.label : raw;
  if (!SHOW_CATEGORY_ICON) return escapeHtml(text);
  const icon = meta ? meta.icon : pickFallbackCategoryIcon(raw);
  return `${icon} ${escapeHtml(text)}`;
}

function getCategoryOrderIndex(category){
  return CATEGORY_ORDER.indexOf(normalizeCategoryKey(category));
}

function fmtPrice(n){
  const v = Number(n);
  return Number.isFinite(v) ? `$${v.toFixed(2)}` : "$0.00";
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function parsePrice(text){
  const n = Number(String(text || "").replace(/[^0-9.]/g, ""));
  return Number.isFinite(n) ? n : 0;
}

function isUnavailableBadgeText(text){
  const badgeText = String(text || "").trim().toLowerCase();
  if (!badgeText) return false;
  return /out\s*of\s*stock|coming\s*up\s*soon|coming\s*soon|non[-\s]?orderable|sold\s*out|unavailable/.test(badgeText);
}

function isComingSoonBadgeText(text){
  const badgeText = String(text || "").trim().toLowerCase();
  if (!badgeText) return false;
  return /coming\s*up\s*soon|coming\s*soon/.test(badgeText);
}

function parseDailyRemaining(value){
  if (value === null || value === undefined) return Number.POSITIVE_INFINITY;
  if (typeof value === "string" && value.trim() === "") return Number.POSITIVE_INFINITY;

  const n = Number(value);
  if (!Number.isFinite(n) || n < 0) return Number.POSITIVE_INFINITY;
  return n;
}

function getBadgeMeta(product){
  const badgeText = String(product?.badge || "").trim();
  if (isPromotionCategory(product?.category)){
    return {
      type: "promo",
      text: badgeText || "Promotion",
      icon: "🏷️",
      unavailable: true,
    };
  }

  const stockStatus = String(product?.stock_status || "").toLowerCase();
  const dailyRemaining = parseDailyRemaining(product?.daily_remaining);
  const hasDailyLimit = Number.isFinite(dailyRemaining);
  const isSoldOutToday = hasDailyLimit && dailyRemaining <= 0;
  const isOutByStatus = stockStatus === "out_of_stock" || stockStatus === "non_orderable" || stockStatus === "sold_out";
  const isOutByFlag = product?.orderable === false || product?.is_orderable === false;
  const isOutByText = isUnavailableBadgeText(badgeText);
  const isOutOfStock = isSoldOutToday || isOutByStatus || isOutByFlag || isOutByText;
  const isComingSoon = isComingSoonBadgeText(badgeText) && !isSoldOutToday;

  if (isOutOfStock){
    const soldOutText = "Sold Out";
    return {
      type: isComingSoon ? "soon" : "oos",
      text: isComingSoon ? (badgeText || "Coming Up Soon") : (isSoldOutToday ? soldOutText : (badgeText || "Out of Stock")),
      icon: isComingSoon ? "🔜" : "⛔",
      unavailable: true,
    };
  }

  if (!badgeText) return null;

  return {
    type: "best",
    text: badgeText,
    icon: "⭐"
  };
}

/** =========================
 *  CART + QTY
 * ========================= */
const cart = {}; // { sku: qty }
const productMetaBySku = new Map();
const discountAmountBySku = new Map(); // sku -> discount amount ($)

function getQty(sku){ return cart[sku] || 0; }

function toWholeQty(v){
  return Math.max(0, Math.floor(Number(v) || 0));
}

function roundMoney(v){
  return Math.round((Number(v) || 0) * 100) / 100;
}

function roundPortionQty(v){
  return Math.round((Number(v) || 0) * 10000) / 10000;
}

function getUnitPrice(sku){
  const meta = productMetaBySku.get(String(sku));
  const price = Number(meta?.sellPrice || 0);
  return Number.isFinite(price) ? price : 0;
}

function getDiscountAmountTotal(){
  let total = 0;
  for (const amount of discountAmountBySku.values()){
    total += roundMoney(amount);
  }
  return roundMoney(total);
}

function discountAmountToPortionQty(sku, amount){
  const unitPrice = getUnitPrice(sku);
  if (!(unitPrice > 0)) return 0;
  return roundPortionQty(roundMoney(amount) / unitPrice);
}

function getDiscountPortionTotal(){
  let total = 0;
  for (const [sku, amount] of discountAmountBySku.entries()){
    total += discountAmountToPortionQty(sku, amount);
  }
  return roundPortionQty(total);
}

function setQty(sku, qty){
  const meta = productMetaBySku.get(String(sku));
  if (meta && meta.orderable === false){
    delete cart[sku];
    discountAmountBySku.delete(String(sku));
    updateUI();
    return;
  }

  const q = Math.max(0, Math.floor(Number(qty) || 0));
  if (q === 0){
    delete cart[sku];
    discountAmountBySku.delete(String(sku));
  }else{
    cart[sku] = q;
  }

  updateUI();
  if (cartDrawer.classList.contains("open")) renderCartPreview();
  if (promotionModal.classList.contains("open")){
    refreshPromotionSkuOptions();
    renderPromotionList();
  }
}

function updateQtyControls(){
  document.querySelectorAll(".item[data-sku]").forEach(item=>{
    const sku = item.dataset.sku;
    const container = item.querySelector(".qty-control");
    if (!container) return;

    const orderable = item.dataset.orderable !== "false";
    if (!orderable){
      const meta = productMetaBySku.get(String(sku));
      const reason = String(meta?.unavailableLabel || "Unavailable");
      const unavailableType = String(meta?.unavailableType || "").toLowerCase();
      const typeClass = unavailableType ? ` qty-unavailable-${unavailableType}` : "";
      let text = "UNAVAILABLE";
      if (unavailableType === "soon") text = "COMING SOON";
      else if (unavailableType === "oos") text = "SOLD OUT";
      else if (unavailableType === "promo") text = "PROMOTION";
      container.innerHTML = `<span class="qty-unavailable${typeClass}" title="${escapeHtml(reason)}">${text}</span>`;
      return;
    }

    const qty = getQty(sku);
    if (qty === 0){
      container.innerHTML = `<button class="qty-btn plus" type="button">+</button>`;
    } else {
      container.innerHTML = `
        <button class="qty-btn minus" type="button">−</button>
        <div class="qty-number">${qty}</div>
        <button class="qty-btn plus" type="button">+</button>
      `;
    }
  });
}

/** 只允许点 + / - 改数量（点别的地方不交互） */
document.addEventListener("click",(e)=>{
  const target = getEventTargetElement(e.target);

  const plus = target.closest(".qty-btn.plus");
  const minus = target.closest(".qty-btn.minus");

  const item = target.closest(".item[data-sku]");

  e.preventDefault();
  e.stopPropagation();

  const sku = item.dataset.sku;

  if (plus) setQty(sku, getQty(sku) + 1);
  if (minus) setQty(sku, getQty(sku) - 1);
});

function getPromotionCandidates(){
  return Object.keys(cart)
    .map((sku)=>({ sku, qty: Number(cart[sku] || 0), meta: productMetaBySku.get(String(sku)) }))
    .filter((item)=> item.qty > 0 && item.meta && item.meta.orderable !== false);
}

function refreshPromotionSkuOptions(){
  const candidates = getPromotionCandidates();
  const currentValue = String(promotionSkuSelect.value || "");
  promotionSkuSelect.innerHTML = "";

  for (const item of candidates){
    const option = document.createElement("option");
    option.value = item.sku;
    option.textContent = `${item.meta.name || item.sku} (x${item.qty})`;
    promotionSkuSelect.appendChild(option);
  }

  if (!candidates.length) return;
  if (candidates.some((item)=> item.sku === currentValue)){
    promotionSkuSelect.value = currentValue;
  } else {
    promotionSkuSelect.value = candidates[0].sku;
  }
}

function renderPromotionList(){
  const rows = [];
  for (const [sku, discountAmount] of discountAmountBySku.entries()){
    if (!cart[sku]) continue;
    const meta = productMetaBySku.get(String(sku));
    const name = meta?.name || sku;
    const cartQty = toWholeQty(cart[sku]);
    const amount = roundMoney(discountAmount);
    rows.push({ sku, name, cartQty, amount });
  }

  if (!rows.length){
    promotionListEl.innerHTML = `<div class="promo-empty">No discount added.</div>`;
    return;
  }

  promotionListEl.innerHTML = rows.map((row)=>`
    <div class="promo-item">
      <div class="promo-item-main">
        <div class="promo-item-name">${escapeHtml(row.name)}</div>
        <div class="promo-item-meta">Cart qty: ${row.cartQty} · Discount: ${fmtPrice(row.amount)}</div>
      </div>
      <button class="promo-item-remove" type="button" data-remove-discount="${encodeURIComponent(row.sku)}">Remove</button>
    </div>
  `).join("");
}

function openPromotionModal(){
  if (!getPromotionCandidates().length) return;
  refreshPromotionSkuOptions();
  renderPromotionList();
  promotionAmountInput.value = "";
  promotionModal.classList.add("open");
  promotionModal.setAttribute("aria-hidden", "false");
}

function closePromotionModal(){
  promotionModal.classList.remove("open");
  promotionModal.setAttribute("aria-hidden", "true");
}

}

function closeSavingsModal(){
  savingsModal.classList.remove("open");
  savingsModal.setAttribute("aria-hidden", "true");
}

savingsDepositSubmit?.addEventListener("click", async ()=>{
  const customerName = String(savingsDepositCustomerInput.value || checkoutState.selectedSavingsCustomerName || "").trim();
  const amount = roundMoney(savingsDepositAmountInput.value);
  const note = String(savingsDepositNoteInput.value || "").trim();
  const pin = String(savingsDepositPinInput.value || "").trim();
  const requestId = `dep-${Date.now()}-${Math.floor(Math.random() * 100000)}`;

  if (!(amount > 0)){
    savingsDepositMessage.textContent = "Amount must be greater than 0.";
    savingsDepositAmountInput.focus();
    return;
  }
  if (requestId.length < 8){
    savingsDepositMessage.textContent = "Request id is too short.";
    return;
  }
  if (!pin){
    savingsDepositMessage.textContent = "PIN is required.";
    savingsDepositPinInput.focus();
    return;
  }
  if (!customerName){
    savingsDepositMessage.textContent = "Customer name is required.";
    savingsDepositCustomerInput.focus();
    return;
  }

  savingsDepositSubmit.disabled = true;
  savingsDepositMessage.textContent = "Submitting deposit...";
  try{
    await postJson(apiUrl("api/savings/deposit"), {
      customer_name: customerName,
      amount,
      request_id: requestId,
      note,
    }, {
      "X-Sell-Pin": pin
    });
    savingsDepositMessage.textContent = "Deposit submitted ✓";
    await loadSavingsAccounts();
    renderSavingsModalAccounts();
    savingsDepositAmountInput.value = "";
    savingsDepositNoteInput.value = "";
    savingsDepositPinInput.value = "";
    syncActionSavingsUI();
  }catch(err){
    savingsDepositMessage.textContent = err?.message || "Deposit failed.";
  }finally{
    savingsDepositSubmit.disabled = false;
  }
});

payLaterListEl?.addEventListener("click", async (e)=>{
  const target = getEventTargetElement(e.target);
  if (!target) return;

  const actionBtn = target.closest("[data-paylater-action]");
  if (!actionBtn) return;

  const customerName = decodeURIComponent(String(actionBtn.getAttribute("data-customer-name") || "").trim());
  if (!customerName) return;

  const action = String(actionBtn.getAttribute("data-paylater-action") || "").trim();
  const card = actionBtn.closest(".promo-item");
  const amountInput = card?.querySelector(".pay-later-amount-input");
  const openAmount = Number(actionBtn.getAttribute("data-open-amount") || 0);

  let amount = 0;
  if (action === "all") amount = openAmount;
  else amount = Number(amountInput?.value || 0);

  if (!(amount > 0)){
    setSummaryOverride("Enter valid payment amount", 2000);
    return;
  }

  actionBtn.disabled = true;
  try{
    const result = await payCustomerPartial(customerName, amount);
    if (result?.already_paid){
      setSummaryOverride("Already paid", 1800);
    }else if (action === "all"){
      setSummaryOverride("Payoff completed ✓", 2200);
    }else{
      setSummaryOverride("Partial payment recorded ✓", 2200);
    }
  }catch(err){
    setSummaryOverride(err?.message || "Payment failed", 2600);
  }finally{
    actionBtn.disabled = false;
  }
});

promotionApplyBtn.addEventListener("click", ()=>{
  const sku = String(promotionSkuSelect.value || "").trim();
  const cartQty = toWholeQty(cart[sku]);
  if (!sku || cartQty <= 0){
    setSummaryOverride("Select cart product first", 1800);
    return;
  }

  const unitPrice = getUnitPrice(sku);
  if (!(unitPrice > 0)){
    setSummaryOverride("Invalid product price", 2000);
    return;
  }

  const discountAmount = roundMoney(promotionAmountInput.value);
  if (!(discountAmount > 0)){
    setSummaryOverride("Enter discount amount", 1800);
    return;
  }
  const maxAmount = roundMoney(unitPrice * cartQty);
  if (discountAmount > maxAmount){
    setSummaryOverride(`Discount exceeds max ${fmtPrice(maxAmount)} for this cart qty`, 2600);
    return;
  }

  discountAmountBySku.set(sku, discountAmount);
  promotionAmountInput.value = "";
  renderPromotionList();
  updateUI();
  if (cartDrawer.classList.contains("open")) renderCartPreview();
});

promotionListEl.addEventListener("click", (e)=>{
  const target = getEventTargetElement(e.target);
  if (!target) return;

  const btn = target.closest("[data-remove-discount]");
  if (!btn) return;
  const sku = decodeURIComponent(String(btn.getAttribute("data-remove-discount") || "").trim());
  if (!sku) return;
  discountAmountBySku.delete(sku);
  renderPromotionList();
  updateUI();
  if (cartDrawer.classList.contains("open")) renderCartPreview();
});

function updateUI(){
  for (const sku of Object.keys(cart)){
    const meta = productMetaBySku.get(String(sku));
    if (meta && meta.orderable === false){
      delete cart[sku];
      discountAmountBySku.delete(String(sku));
    }
  }

  for (const sku of Array.from(discountAmountBySku.keys())){
    const cartQty = toWholeQty(cart[sku]);
    if (cartQty <= 0){
      discountAmountBySku.delete(sku);
      continue;
    }
    const unitPrice = getUnitPrice(sku);
    const discountAmount = roundMoney(discountAmountBySku.get(sku));
    if (!(unitPrice > 0) || !(discountAmount > 0)){
      discountAmountBySku.delete(sku);
      continue;
    }
    const maxAmount = roundMoney(unitPrice * cartQty);
    if (discountAmount > maxAmount){
      discountAmountBySku.set(sku, maxAmount);
    }
  }

  updateQtyControls();
  if (promotionModal.classList.contains("open")){
    refreshPromotionSkuOptions();
    renderPromotionList();
  }

  const totalQty = Object.values(cart).reduce((a,b)=>a+b,0);
  const discountAmountTotal = getDiscountAmountTotal();
  let defaultSummary = "No items selected";

  const hasUnorderableInCart = Object.keys(cart).some((sku)=>{
    const meta = productMetaBySku.get(String(sku));
    return meta?.orderable === false;
  });

  if(totalQty === 0 || hasUnorderableInCart){
    sellBtnEl.disabled = true;
    promotionOpenBtnEl.disabled = true;
    clearBtnEl.disabled = true;
    if (giftBtnEl) giftBtnEl.disabled = true;
    closePromotionModal();
  }else{
    defaultSummary = `${totalQty} item(s)`;
    if (discountAmountTotal > 0){
      defaultSummary += ` · Discount ${fmtPrice(discountAmountTotal)}`;
    }
    sellBtnEl.disabled = false;
    promotionOpenBtnEl.disabled = false;
    clearBtnEl.disabled = false;
    if (giftBtnEl) giftBtnEl.disabled = false;
  }

  summaryTextEl.textContent = summaryOverrideText || defaultSummary;
}

function setSummaryOverride(text, durationMs = 0){
  summaryOverrideText = String(text || "").trim();
  if (summaryOverrideTimer){
    clearTimeout(summaryOverrideTimer);
    summaryOverrideTimer = null;
  }
  updateUI();
  if (durationMs > 0){
    const effectiveDurationMs = Math.max(MIN_SUMMARY_OVERRIDE_MS, Number(durationMs) || 0);
    summaryOverrideTimer = setTimeout(()=>{
      summaryOverrideText = "";
      summaryOverrideTimer = null;
      updateUI();
    }, effectiveDurationMs);
  }
}

function renderCartPreview(){
  cartItemsEl.innerHTML = "";
  let totalQty = 0;
  let totalPrice = 0;

  Object.keys(cart).forEach(sku=>{
    const qty = cart[sku];
    totalQty += qty;

    const item = document.querySelector(`.item[data-sku="${sku}"]`);
    if (!item) return;

    const imgEl = item.querySelector("img");
    const meta = productMetaBySku.get(String(sku));
    const unitPrice = Number(meta?.sellPrice || 0);
    totalPrice += unitPrice * qty;

    const wrapper = document.createElement("div");
    wrapper.className = "cart-item-row";
    wrapper.innerHTML = `
      <img src="${imgEl?.src || ""}" class="cart-item-img" alt="">
      <div class="cart-item-main">
        <div class="cart-item-name">${escapeHtml(meta?.name || sku)}</div>
        <div class="cart-item-meta">
          <div class="cart-item-price">${fmtPrice(unitPrice)} each</div>
          <div class="cart-item-qty">Qty: ${qty}</div>
        </div>
      </div>
      <div class="cart-item-stepper">
        <button class="cart-step-btn minus" type="button" data-sku="${encodeURIComponent(sku)}">−</button>
        <div class="cart-step-number">${qty}</div>
        <button class="cart-step-btn plus" type="button" data-sku="${encodeURIComponent(sku)}">+</button>
      </div>
    `;
    cartItemsEl.appendChild(wrapper);
  });

  cartTotalEl.textContent = `Total Items: ${totalQty}`;
  cartTotalPriceEl.textContent = `Total Price: ${fmtPrice(totalPrice)}`;
  const discountAmountTotal = getDiscountAmountTotal();
  cartDiscountPriceEl.textContent = discountAmountTotal > 0
    ? `Discount: -${fmtPrice(discountAmountTotal)}`
    : "";

  const preview = checkoutState.cartPreview || {};
  const previewSavings = roundMoney(preview?.savings_deduction_amount);
  const previewCash = roundMoney(preview?.cash_amount);
  const previewCustomer = String(preview?.savings_customer_name || "").trim();
  cartSavingsDeductionEl.textContent = previewSavings > 0 ? `Savings Deduction: ${fmtPrice(previewSavings)}` : "";
  cartCashAmountEl.textContent = previewCash > 0 ? `Cash Amount: ${fmtPrice(previewCash)}` : "";
  cartSavingsCustomerEl.textContent = previewCustomer ? `Savings Customer: ${previewCustomer}` : "";
}

async function postJson(url, body, extraHeaders = {}){
  const res = await fetch(url, {
    method:"POST",
    headers: { "Content-Type":"application/json", ...extraHeaders },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error(formatApiErrorMessage(data, "Request failed"));
  return data;
}

async function getJsonWithAuth(path){
  const endpoint = apiUrl(path);
  const endpointWithApiKey = (()=>{
    try{
      const u = new URL(endpoint);
      u.searchParams.set("api_key", API_KEY);
      return u.toString();
    }catch(_err){
      const joiner = endpoint.includes("?") ? "&" : "?";
      return `${endpoint}${joiner}api_key=${encodeURIComponent(API_KEY)}`;
    }
  })();

  const attempts = [
    { url: endpoint, options: { headers: { "X-API-Key": API_KEY } } },
    { url: endpointWithApiKey, options: {} },
    { url: endpoint, options: {} }
  ];

  let lastError = "Request failed";
  for (const attempt of attempts){
    try{
      const res = await fetch(attempt.url, attempt.options);
      if (res.ok) return await res.json();
      const detail = (await res.text().catch(()=>"")).trim();
      lastError = detail || `HTTP ${res.status}`;
      if (res.status !== 401 && res.status !== 403) break;
    }catch(err){
      lastError = err?.message || "network error";
    }
  }
  throw new Error(lastError);
}

async function loadPayLaterOpenList(){
  return getJsonWithAuth("api/pay-later/open");
}

async function loadSavingsAccounts(){
  const rows = await getJsonWithAuth("api/savings/accounts?available_only=true");
  const accounts = Array.isArray(rows) ? rows : [];
  checkoutState.savingsAccounts = accounts.map((row)=>({
    customer_name: String(row?.customer_name || "").trim(),
    balance: roundMoney(row?.balance),
    active: Boolean(row?.active),
    updated_at: String(row?.updated_at || ""),
    note: String(row?.note || ""),
  })).filter((row)=> row.customer_name);

  if (!checkoutState.savingsAccounts.some((row)=> row.customer_name === checkoutState.selectedSavingsCustomerName)){
    checkoutState.selectedSavingsCustomerName = checkoutState.savingsAccounts[0]?.customer_name || "";
  }

  return checkoutState.savingsAccounts;
}

function renderSavingsAccountOptions(selectEl, accounts, selectedCustomerName = ""){
  if (!selectEl) return;
  selectEl.innerHTML = "";
  for (const row of accounts){
    const option = document.createElement("option");
    option.value = row.customer_name;
    option.textContent = `${row.customer_name || "Unknown"} · ${fmtPrice(row.balance)}`;
    selectEl.appendChild(option);
  }
  if (accounts.some((row)=> row.customer_name === selectedCustomerName)){
    selectEl.value = selectedCustomerName;
  }else if (accounts.length){
    selectEl.value = accounts[0].customer_name;
  }
}

function getCheckoutOrderTotal(){
  const subtotal = Object.keys(cart).reduce((sum, sku)=>{
    return sum + (Number(cart[sku] || 0) * getUnitPrice(sku));
  }, 0);
  return roundMoney(subtotal - getDiscountAmountTotal());
}

function syncActionSavingsWarning(){
  if (!actionUseSavingsInput.checked){
    actionSavingsWarning.textContent = "";
    return;
  }
  const deduction = roundMoney(actionSavingsDeductionInput.value);
  const selected = checkoutState.savingsAccounts.find((row)=> row.customer_name === actionSavingsAccountSelect.value);
  if (selected && deduction > selected.balance){
    actionSavingsWarning.textContent = `Warning: deduction exceeds account balance (${fmtPrice(selected.balance)}).`;
  }else{
    actionSavingsWarning.textContent = "";
  }
}

function syncActionSavingsUI(){
  const isCash = actionPaymentTypeSelect.style.display !== "none"
    && String(actionPaymentTypeSelect.value || "") === "Cash";
  const hasAccounts = checkoutState.savingsAccounts.length > 0;
  const showSection = isCash && hasAccounts;
  actionSavingsSection.style.display = showSection ? "" : "none";

  if (!showSection){
    actionUseSavingsInput.checked = false;
    actionSavingsFields.style.display = "none";
    actionSavingsDeductionInput.value = "0";
    checkoutState.useSavings = false;
    checkoutState.savingsDeductionAmount = 0;
    actionSavingsWarning.textContent = "";
    return;
  }

  renderSavingsAccountOptions(actionSavingsAccountSelect, checkoutState.savingsAccounts, checkoutState.selectedSavingsCustomerName);
  checkoutState.selectedSavingsCustomerName = String(actionSavingsAccountSelect.value || "");
  actionSavingsFields.style.display = actionUseSavingsInput.checked ? "" : "none";
  syncActionSavingsWarning();
}

function renderSavingsModalAccounts(){
  const hasAccounts = checkoutState.savingsAccounts.length > 0;
  savingsAccountField.style.display = hasAccounts ? "" : "none";
  savingsAccountEmpty.style.display = hasAccounts ? "none" : "";
  renderSavingsAccountOptions(savingsAccountSelect, checkoutState.savingsAccounts, checkoutState.selectedSavingsCustomerName);
}

function renderPayLaterSummaryFromRows(rows){
  const safeRows = Array.isArray(rows) ? rows : [];
  const openCount = safeRows.length;
  const openAmount = roundMoney(safeRows.reduce((sum, row)=>{
    const remainingAmount = roundMoney(row?.remaining_amount);
    return sum + (remainingAmount > 0 ? remainingAmount : 0);
  }, 0));

  payLaterSummaryEl.innerHTML = `
    <div class="pay-later-summary">
      <span>Open items: ${openCount}</span>
      <span>Open amount: ${fmtPrice(openAmount)}</span>
    </div>
  `;
}

function renderPayLaterList(rows){
  if (!Array.isArray(rows) || !rows.length){
    payLaterListEl.innerHTML = `<div class="promo-empty">No open pay later items.</div>`;
    return;
  }

  const grouped = new Map();
  for (const row of rows){
    const customerName = String(row?.customer_name || "Unknown").trim() || "Unknown";
    const remainingAmount = roundMoney(
      row?.remaining_amount !== undefined && row?.remaining_amount !== null
        ? row.remaining_amount
        : row?.amount
    );
    if (!grouped.has(customerName)){
      grouped.set(customerName, {
        customerName,
        totalRemaining: 0,
        count: 0,
        paymentType: String(row?.payment_type || "Pay Later")
      });
    }

    const g = grouped.get(customerName);
    g.totalRemaining = roundMoney(g.totalRemaining + (remainingAmount > 0 ? remainingAmount : 0));
    g.count += 1;
  }

  const groups = Array.from(grouped.values()).sort((a,b)=> a.customerName.localeCompare(b.customerName));

  if (!groups.length){
    payLaterListEl.innerHTML = `<div class="promo-empty">No open pay later items.</div>`;
    return;
  }

  payLaterListEl.innerHTML = groups.map((group)=>`
    <div class="promo-item">
      <div class="promo-item-main">
        <div class="promo-item-name">${escapeHtml(group.customerName)}</div>
        <div class="promo-item-meta">${fmtPrice(group.totalRemaining)}</div>
      </div>
      <div class="pay-later-actions">
        <input class="pay-later-amount-input" type="number" min="0.01" step="0.01" placeholder="Amount">
        <button class="pay-later-payoff" type="button" data-paylater-action="partial" data-customer-name="${encodeURIComponent(group.customerName)}" data-open-amount="${group.totalRemaining}">Pay</button>
        <button class="pay-later-payoff" type="button" data-paylater-action="all" data-customer-name="${encodeURIComponent(group.customerName)}" data-open-amount="${group.totalRemaining}">Payoff</button>
      </div>
    </div>
  `).join("");
}

async function refreshPayLaterPanel(){
  const rows = await loadPayLaterOpenList();
  const safeRows = Array.isArray(rows) ? rows : [];
  renderPayLaterSummaryFromRows(safeRows);
  renderPayLaterList(safeRows);
}

function closePayLaterModal(){

async function payCustomerPartial(customerName, amount){
  const confirm = await openActionModal({
    title: amount > 0 ? `Confirm Payment ${fmtPrice(amount)}` : "Confirm Payment",
    confirmText: "Confirm",
    showNote: true,
    showPaymentType: false,
    hintText: "Add payment note (optional) and enter PIN."
  });
  if (!confirm) return null;

  const { note, pin } = confirm;
  const payload = {
    request_id: crypto.randomUUID(),
    amount: roundMoney(amount),
    note,
    paid_by: "frontend"
  };

  const result = await postJson(apiUrl(`api/pay-later/customers/${encodeURIComponent(customerName)}/pay`), payload, {
    "X-Sell-Pin": pin
  });

  await refreshPayLaterPanel();
  return result;
}

  actionModal.classList.remove("open");
  actionModal.setAttribute("aria-hidden", "true");
  actionForm.reset();
  actionErrorEl.textContent = "";
  actionSavingsWarning.textContent = "";

  const resolver = actionModalResolver;
  actionModalResolver = null;
  if (resolver) resolver(result);
}

function syncPayLaterCustomerField(){
  const isPayLater = actionPaymentTypeSelect.style.display !== "none"
    && String(actionPaymentTypeSelect.value || "") === "Pay Later";
  checkoutState.paymentType = String(actionPaymentTypeSelect.value || "Cash");
  actionCustomerNameLabel.style.display = isPayLater ? "" : "none";
  actionCustomerNameInput.style.display = isPayLater ? "" : "none";
  if (!isPayLater) actionCustomerNameInput.value = "";
  syncActionSavingsUI();
}

function openActionModal({
  title,
  confirmText,
  showNote = true,
  showPaymentType = false,
  hintText = "Please add optional note and enter PIN to continue.",
  defaultPaymentType = "Cash"
}){
  return new Promise((resolve)=>{
    actionModalResolver = resolve;
    actionTitleEl.textContent = title;
    actionConfirmBtn.textContent = confirmText;
    actionHintEl.textContent = hintText;
    actionNoteLabel.style.display = showNote ? "" : "none";
    actionNoteInput.style.display = showNote ? "" : "none";
    actionNoteInput.value = "";
    actionPaymentTypeLabel.style.display = showPaymentType ? "" : "none";
    actionPaymentTypeSelect.style.display = showPaymentType ? "" : "none";
    actionPaymentTypeSelect.value = defaultPaymentType;
    checkoutState.paymentType = defaultPaymentType;
    checkoutState.useSavings = false;
    checkoutState.savingsDeductionAmount = 0;
    actionUseSavingsInput.checked = false;
    actionSavingsDeductionInput.value = "0";
    actionCustomerNameInput.value = "";
    syncPayLaterCustomerField();
    actionPinInput.value = "";
    actionErrorEl.textContent = "";
    actionModal.classList.add("open");
    actionModal.setAttribute("aria-hidden", "false");
    if (showNote) actionNoteInput.focus();
    else actionPinInput.focus();
  });
}

actionCloseBtn.addEventListener("click", ()=> closeActionModal(null));
actionCancelBtn.addEventListener("click", ()=> closeActionModal(null));
actionModal.addEventListener("click", (e)=>{
  // 仅允许通过明确操作按钮退出，不响应遮罩点击
  if (e.target === actionModal) return;
});

actionPaymentTypeSelect.addEventListener("change", syncPayLaterCustomerField);

actionUseSavingsInput?.addEventListener("change", ()=>{
  checkoutState.useSavings = actionUseSavingsInput.checked;
  actionSavingsFields.style.display = checkoutState.useSavings ? "" : "none";
  if (!checkoutState.useSavings){
    actionSavingsDeductionInput.value = "0";
    checkoutState.savingsDeductionAmount = 0;
  }
  syncActionSavingsWarning();
});

actionSavingsAccountSelect?.addEventListener("change", ()=>{
  checkoutState.selectedSavingsCustomerName = String(actionSavingsAccountSelect.value || "");
  syncActionSavingsWarning();
});

actionSavingsDeductionInput?.addEventListener("input", ()=>{
  checkoutState.savingsDeductionAmount = roundMoney(actionSavingsDeductionInput.value);
  syncActionSavingsWarning();
});

actionForm.addEventListener("submit", (e)=>{
  e.preventDefault();
  const note = String(actionNoteInput.value || "");
  const pin = String(actionPinInput.value || "").trim();
  const paymentType = normalizePaymentType(actionPaymentTypeSelect.value || "Cash");
  const customerName = String(actionCustomerNameInput.value || "").trim();
  const useSavings = Boolean(actionUseSavingsInput.checked);
  const savingsCustomerName = String(actionSavingsAccountSelect.value || "").trim();
  const savingsDeductionAmount = roundMoney(actionSavingsDeductionInput.value);
  const orderTotal = getCheckoutOrderTotal();

  if (!paymentType){
    actionErrorEl.textContent = "Invalid payment type.";
    actionPaymentTypeSelect.focus();
    return;
  }

  if (paymentType === "Pay Later" && !customerName){
    actionErrorEl.textContent = "Customer name is required for Pay Later.";
    actionCustomerNameInput.focus();
    return;
  }

  if (useSavings && paymentType !== "Cash"){
    actionErrorEl.textContent = "Savings deduction is only available for Cash payment.";
    actionPaymentTypeSelect.focus();
    return;
  }

  if (useSavings && !savingsCustomerName){
    actionErrorEl.textContent = "Please select a savings customer.";
    actionSavingsAccountSelect.focus();
    return;
  }

  if (useSavings && savingsDeductionAmount < 0){
    actionErrorEl.textContent = "Savings deduction amount cannot be negative.";
    actionSavingsDeductionInput.focus();
    return;
  }

  if (useSavings && savingsDeductionAmount > orderTotal){
    actionErrorEl.textContent = "Savings deduction cannot exceed order total.";
    actionSavingsDeductionInput.focus();
    return;
  }

  if (!pin){
    actionErrorEl.textContent = "PIN is required.";
    actionPinInput.focus();
    return;
  }

  closeActionModal({ note, pin, paymentType, customerName, useSavings, savingsCustomerName, savingsDeductionAmount });
});

sellBtnEl.addEventListener("click", async ()=>{
  const skus = Object.keys(cart);
  if(!skus.length) return;

  try{
    await loadSavingsAccounts();
  }catch(err){
    checkoutState.savingsAccounts = [];
  }

  const saleConfirm = await openActionModal({
    title: "Confirm Sale",
    confirmText: "Sell Now",
    showNote: true,
    showPaymentType: true,
    defaultPaymentType: "Cash"
  });
  if (!saleConfirm) return;

  const { note, pin, paymentType, customerName, useSavings, savingsCustomerName, savingsDeductionAmount } = saleConfirm;

  const items = skus.map(sku => ({ sku, qty: cart[sku] }));
  const discountItems = skus
    .map((sku)=>{
      const lossAmount = roundMoney(discountAmountBySku.get(sku));
      const discountQty = toWholeQty(cart[sku]);
      return {
        sku,
        qty: discountQty,
        loss_amount: lossAmount,
      };
    })
    .filter((item)=> item.qty >= 1 && item.loss_amount > 0);

  sellBtnEl.disabled = true;
  promotionOpenBtnEl.disabled = true;
  clearBtnEl.disabled = true;
  setSummaryOverride("Submitting...");

  try{
    const saleRequestId = crypto.randomUUID();
    const payload = {
      items,
      request_id: saleRequestId,
      note,
      payment_type: paymentType
    };

    if ((paymentType || "") === "Pay Later"){
      payload.customer_name = customerName || "";
    }

    if (useSavings){
      payload.savings_customer_name = savingsCustomerName;
      payload.savings_deduction_amount = savingsDeductionAmount;
    }

    const saleResult = await postJson(apiUrl("api/sales/batch"), payload, {
      "X-Sell-Pin": pin
    });

    let discountError = "";
    if (discountItems.length){
      try{
        await postJson(apiUrl("api/losses/batch"), {
          items: discountItems,
          request_id: crypto.randomUUID(),
          loss_type: "DISCOUNT"
        }, {
          "X-Sell-Pin": pin
        });
      }catch(err){
        discountError = err?.message || "Discount write failed";
      }
    }

    for(const k of Object.keys(cart)) delete cart[k];
    discountAmountBySku.clear();
    closePromotionModal();
    await refreshProductsForStockState();
    updateUI();
    if (cartDrawer.classList.contains("open")) cartDrawer.classList.remove("open");

    checkoutState.cartPreview = saleResult?.cart_preview && typeof saleResult.cart_preview === "object"
      ? saleResult.cart_preview
      : {
          total_amount: saleResult?.total_amount,
          savings_deduction_amount: saleResult?.savings_deduction_amount,
          cash_amount: saleResult?.cash_amount,
          savings_customer_name: saleResult?.savings_customer_name,
        };

    const resultTotal = roundMoney(checkoutState.cartPreview?.total_amount);
    const resultSavings = roundMoney(checkoutState.cartPreview?.savings_deduction_amount);
    const resultCash = roundMoney(checkoutState.cartPreview?.cash_amount);
    const splitSummary = `Total ${fmtPrice(resultTotal)} · Savings ${fmtPrice(resultSavings)} · Cash ${fmtPrice(resultCash)}`;

    if (discountError){
      setSummaryOverride(`Sold, discount failed: ${discountError}`, 3200);
    }else{
      setSummaryOverride(`Sold ✓ ${splitSummary}`, 10000);
    }
  }catch(err){
    setSummaryOverride(err?.message || "Sell failed", 3000);
  }finally{
    updateUI();
  }
});

giftBtnEl?.addEventListener("click", async ()=>{
  const skus = Object.keys(cart);
  if(!skus.length) return;

  const giftConfirm = await openActionModal({
    title: "Confirm Gift / Discount",
    confirmText: "Submit Gift",
    showNote: true
  });
  if (!giftConfirm) return;

  const { note, pin } = giftConfirm;

  giftBtnEl.disabled = true;
  setSummaryOverride("Submitting gift...");

  try{
    const items = skus.map((sku) => {
      const qty = cart[sku];
      const lossAmount = roundMoney(getUnitPrice(sku) * qty);
      return { sku, qty, loss_amount: lossAmount };
    });

    await postJson(apiUrl("api/losses/batch"), {
      items,
      request_id: crypto.randomUUID(),
      loss_type: "GIFT",
      note
    }, {
      "X-Sell-Pin": pin
    });

    for(const k of Object.keys(cart)) delete cart[k];
    discountAmountBySku.clear();
    closePromotionModal();
    await refreshProductsForStockState();
    updateUI();
    if (cartDrawer.classList.contains("open")) cartDrawer.classList.remove("open");

    setSummaryOverride("Gift recorded ✓", 10000);
  }catch(err){
    setSummaryOverride(err?.message || "Gift failed", 3000);
  }finally{
    updateUI();
  }
});

/** =========================
 *  Image preview (delegation)
 *  关键：因为 item 是动态生成的
 * ========================= */
const preview = document.querySelector('.image-preview');
const previewImage = document.querySelector('.image-preview-img');
const previewClose = document.querySelector('.image-preview-close');

function closePreview(){
  preview.classList.remove('is-open');
  preview.setAttribute('aria-hidden', 'true');
  previewImage.src = '';
  previewImage.alt = '';
  document.body.classList.remove('preview-open');
}

document.addEventListener("click", (event) => {
  const link = event.target.closest(".item a");
  if (!link) return;

  event.preventDefault();
  const img = link.querySelector("img");
  previewImage.src = link.getAttribute("href");
  previewImage.alt = img ? img.alt : "Vista previa";
  preview.classList.add("is-open");
  preview.setAttribute("aria-hidden","false");
  document.body.classList.add("preview-open");
});

preview.addEventListener('click', (event) => {
  if (event.target === preview) closePreview();
});
previewClose.addEventListener('click', closePreview);
document.addEventListener('keydown', (event) => {
  if (event.key !== 'Escape') return;
  if (preview.classList.contains('is-open')){
    closePreview();
    return;
  }
  if (actionModal.classList.contains("open")){
    closeActionModal(null);
    return;
  }
  if (savingsModal.classList.contains("open")){
    closeSavingsModal();
    return;
  }
  if (promotionModal.classList.contains("open")) closePromotionModal();
});

/** =========================
 *  AUTO RENDER MENU
 * ========================= */
function apiUrl(path){
  const normalizedPath = String(path || "").replace(/^\/+/, "");
  return `${API_BASE}/${normalizedPath}`;
}

async function loadProducts(){
  const endpoint = apiUrl("api/products");
  const attempts = [
    {
      label: "header-auth",
      url: endpoint,
      options: { headers: { "X-API-Key": API_KEY } }
    },
    {
      label: "query-auth",
      url: `${endpoint}?api_key=${encodeURIComponent(API_KEY)}`,
      options: {}
    },
    {
      label: "public",
      url: endpoint,
      options: {}
    }
  ];

  const errors = [];

  for (const attempt of attempts){
    try{
      const res = await fetch(attempt.url, attempt.options);
      if (res.ok) return await res.json(); // [{sku,name,category,sell_price,image_url,badge}]

      const reason = (await res.text().catch(()=>"")).trim();
      errors.push(`${attempt.label}: ${res.status}${reason ? ` ${reason}` : ""}`);

      if (res.status !== 401 && res.status !== 403) break;
    }catch(err){
      errors.push(`${attempt.label}: ${err?.message || "network error"}`);
    }
  }

  throw new Error(`Failed to load products (${errors.join(" | ")})`);
}

function groupByCategory(products){
  const map = new Map();
  for (const p of products){
    const cat = String(p.category || "Other").trim();
    if (!map.has(cat)) map.set(cat, []);
    map.get(cat).push(p);
  }
  return map;
}

function sortCategories(cats){
  return cats.sort((a,b)=>{
    const ia = getCategoryOrderIndex(a);
    const ib = getCategoryOrderIndex(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}

function renderMenu(products){
  productMetaBySku.clear();

  const groups = groupByCategory(products);
  const categories = sortCategories(Array.from(groups.keys()));

  menuRoot.innerHTML = "";

  for (const cat of categories){
    const label = getCategoryLabelHtml(cat);

    const catDiv = document.createElement("div");
    catDiv.className = "category";
    catDiv.innerHTML = `<h2 class="category-title">${label}</h2>`;  

    const items = groups.get(cat) || [];
    items.sort((x,y)=> String(x.sku).localeCompare(String(y.sku)));

    for (const p of items){
      const badge = getBadgeMeta(p);
      const badgeText = badge?.text || "";
      const showNameBadge = badge && (badge.unavailable !== true || badge.type === "oos");
      const badgeHtml = showNameBadge
        ? `<span class="item-badge item-badge-${badge.type}"><span class="item-badge-icon" aria-hidden="true">${badge.icon}</span>${escapeHtml(badge.text)}</span>`
        : "";

      const imgUrl = String(p.image_url || "").trim();
      const orderableByFlag = p.orderable !== false && p.is_orderable !== false;
      const orderableByCategory = !isPromotionCategory(p.category);
      const orderableByBadge = !(badge && badge.unavailable === true);
      const orderable = orderableByFlag && orderableByBadge && orderableByCategory;
      const unavailableType = !orderable && !orderableByCategory
        ? "promo"
        : (badge?.type || "");
      const unavailableLabel = !orderable && !orderableByCategory
        ? "Promotion display only"
        : (badge?.text || (orderable ? "" : "Unavailable"));

      productMetaBySku.set(String(p.sku), {
        orderable,
        badge: badgeText,
        unavailableType,
        unavailableLabel,
        category: String(p.category || ""),
        name: String(p.name || ""),
        sellPrice: Number(p.sell_price || 0),
      });

      const item = document.createElement("div");
      const itemClasses = ["item"];
      if (!orderable) itemClasses.push("is-unorderable");
      if (!orderable && unavailableType === "promo") itemClasses.push("is-promo-display");
      item.className = itemClasses.join(" ");
      item.setAttribute("data-sku", p.sku);
      item.setAttribute("data-orderable", orderable ? "true" : "false");

      item.innerHTML = `
        <a href="${escapeHtml(imgUrl)}">
          <img loading="lazy" src="${escapeHtml(imgUrl)}" alt="${escapeHtml(p.name)}">
        </a>
        <div class="item-name">${escapeHtml(p.name)} ${badgeHtml}</div>
        <div class="item-price">${fmtPrice(p.sell_price)}</div>
        <div class="qty-control"></div>
      `;

      catDiv.appendChild(item);
    }

    menuRoot.appendChild(catDiv);
  }

  updateUI();
}

(async function init(){
  try{
    try{
      await loadSavingsAccounts();
    }catch(err){
      checkoutState.savingsAccounts = [];
    }
    const products = await loadProducts();
    renderMenu(products);
    updateUI();
  }catch(e){
    console.error(e);
    menuRoot.innerHTML = `<div class="menu-error" role="alert">⚠️ Failed to load menu. Please check backend/API and refresh.</div>`;
  }
})();
</script>
